## Fluentd configuration file
## See https://docs.fluentd.org for more information

# Syslog input
<source>
  @type syslog
  port 5140
  tag system
</source>

# Forward input (for other Fluentd agents)
<source>
  @type forward
  port 24224
</source>

# OpenSearch output
<match **>
  @type opensearch
  host localhost
  port 9200
  scheme https
  ssl_verify false
  user admin
  password admin
  logstash_format true
  logstash_prefix fluentd
  flush_interval 10s
</match>
